<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uke Tuner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #141414;
–surface: #1a1a1a;
–border: #272727;
–text: #e6e2da;
–text-muted: #65605a;
–text-dim: #353230;
–amber: #c97c0c;
–amber-light: #eda830;
–green: #28955a;
–green-light: #38c472;
–blue: #3a7fc1;
–blue-light: #5a9fe0;
}

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
overflow: hidden;
user-select: none;
}

body {
display: flex;
flex-direction: column;
align-items: center;
height: 100dvh;
}

/* Header */
header {
width: 100%;
padding: 18px 24px 0;
display: flex;
align-items: baseline;
justify-content: space-between;
}
.header-left { display: flex; align-items: baseline; gap: 10px; }
header h1 {
font-family: ‘Playfair Display’, serif;
font-size: 1.25rem;
font-weight: 400;
color: var(–text);
}
.version-badge {
font-size: 0.48rem;
color: var(–text-dim);
letter-spacing: 0.12em;
}
header .tuning-label {
font-size: 0.58rem;
color: var(–text-muted);
letter-spacing: 0.16em;
text-transform: uppercase;
}
#status-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–text-dim);
transition: background 0.4s, box-shadow 0.4s;
flex-shrink: 0;
}
#status-dot.listening { background: var(–green); box-shadow: 0 0 8px var(–green); }
#status-dot.playing   { background: var(–blue);  box-shadow: 0 0 8px var(–blue);  }

/* Main */
main {
flex: 1;
width: 100%;
max-width: 480px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 0 20px 60px;
gap: 0;
}

/* Start prompt */
#start-prompt {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -54%);
display: flex;
flex-direction: column;
align-items: center;
gap: 14px;
text-align: center;
transition: opacity 0.35s;
}
#start-prompt.hidden { opacity: 0; pointer-events: none; }
#start-btn {
background: none;
border: 1px solid var(–border);
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.16em;
text-transform: uppercase;
padding: 13px 32px;
cursor: pointer;
transition: border-color 0.2s;
}
#start-btn:hover { border-color: var(–text-muted); }
#start-prompt p { font-size: 0.6rem; color: var(–text-muted); letter-spacing: 0.08em; }

/* Tuner wrap */
#tuner-wrap {
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
gap: 24px;
opacity: 0;
pointer-events: none;
transition: opacity 0.5s;
}
#tuner-wrap.active { opacity: 1; pointer-events: all; }

/* Note display */
#note-display { text-align: center; line-height: 1; }
#note-name {
font-family: ‘Playfair Display’, serif;
font-size: 5rem;
font-weight: 700;
display: block;
min-height: 1.15em;
transition: color 0.25s;
color: var(–text);
}
#string-label {
font-size: 0.58rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–text-muted);
display: block;
margin-top: 4px;
min-height: 1.4em;
}

/* Meter */
#meter-wrap { width: 100%; max-width: 340px; }
#meter-canvas { width: 100%; display: block; }
#cents-display {
text-align: center;
font-size: 0.62rem;
color: var(–text-muted);
letter-spacing: 0.12em;
margin-top: 6px;
transition: color 0.25s;
min-height: 1.4em;
}

/* String buttons */
#strings { display: flex; gap: 16px; align-items: stretch; }
.string-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
padding: 12px 16px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
cursor: pointer;
transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
-webkit-tap-highlight-color: transparent;
}
.string-btn:hover { border-color: var(–text-muted); }
.string-btn.active { border-color: var(–text-muted); background: #212121; }
.string-btn.in-tune { border-color: var(–green); box-shadow: 0 0 12px rgba(40,149,90,0.18); }
.string-btn.playing { border-color: var(–blue); box-shadow: 0 0 12px rgba(58,127,193,0.2); }

.btn-note {
font-family: ‘Playfair Display’, serif;
font-size: 1.5rem;
color: var(–text-dim);
line-height: 1;
transition: color 0.2s;
}
.string-btn.active .btn-note,
.string-btn.playing .btn-note { color: var(–text); }

.btn-oct {
font-size: 0.52rem;
color: var(–text-dim);
letter-spacing: 0.06em;
transition: color 0.2s;
}
.string-btn.active .btn-oct { color: var(–text-muted); }

.btn-label {
font-size: 0.5rem;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(–text-dim);
transition: color 0.2s;
text-align: center;
}
.string-btn.active .btn-label { color: var(–text-muted); }

.btn-dot {
width: 5px; height: 5px;
border-radius: 50%;
background: var(–text-dim);
transition: background 0.2s, box-shadow 0.2s;
}
.string-btn.active .btn-dot  { background: var(–green-light); box-shadow: 0 0 6px var(–green); }
.string-btn.in-tune .btn-dot { background: var(–green-light); box-shadow: 0 0 10px var(–green-light); }
.string-btn.playing .btn-dot { background: var(–blue-light);  box-shadow: 0 0 8px var(–blue-light); }

/* Disclaimer */
#disclaimer {
position: absolute;
bottom: 52px;
left: 0; right: 0;
text-align: center;
font-size: 0.48rem;
color: var(–text-dim);
letter-spacing: 0.1em;
pointer-events: none;
}

/* Tabs */
nav#tabs {
position: absolute;
bottom: 0; left: 0;
width: 100%;
border-top: 1px solid var(–border);
display: flex;
}
.tab {
flex: 1;
padding: 12px 0 max(12px, env(safe-area-inset-bottom));
text-align: center;
font-size: 0.58rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–text-dim);
cursor: pointer;
border-top: 2px solid transparent;
transition: color 0.2s, border-color 0.2s;
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
}
.tab svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.tab.active { color: var(–text); border-top-color: var(–text-muted); }
.tab:not(.active):hover { color: var(–text-muted); }
</style>

</head>
<body>

<div id="start-prompt">
  <button id="start-btn">Enable Microphone</button>
  <p>Tap a string name to hear a reference tone</p>
</div>

<header>
  <div class="header-left">
    <h1>Uke Tuner</h1>
    <span class="tuning-label">G · C · E · A</span>
    <span class="version-badge">v1.0.0</span>
  </div>
  <div id="status-dot"></div>
</header>

<main>
  <div id="tuner-wrap">
    <div id="note-display">
      <span id="note-name">—</span>
      <span id="string-label">&nbsp;</span>
    </div>

```
<div id="meter-wrap">
  <canvas id="meter-canvas" width="680" height="200"></canvas>
  <div id="cents-display">&nbsp;</div>
</div>

<div id="strings"></div>
```

  </div>
</main>

<div id="disclaimer">vibecoded · use at your own risk</div>

<nav id="tabs">
  <div class="tab active" data-tab="tuner">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    Tuner
  </div>
  <div class="tab" data-tab="chords">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1.5"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
    Chords
  </div>
  <div class="tab" data-tab="library">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Library
  </div>
</nav>

<script>
const STRINGS = [
  { note: 'G', octave: 4, freq: 392.00, label: '4th' },
  { note: 'C', octave: 4, freq: 261.63, label: '3rd' },
  { note: 'E', octave: 4, freq: 329.63, label: '2nd' },
  { note: 'A', octave: 4, freq: 440.00, label: '1st' },
];

const startPrompt  = document.getElementById('start-prompt');
const startBtn     = document.getElementById('start-btn');
const tunerWrap    = document.getElementById('tuner-wrap');
const noteNameEl   = document.getElementById('note-name');
const stringLabelEl= document.getElementById('string-label');
const meterCanvas  = document.getElementById('meter-canvas');
const centsEl      = document.getElementById('cents-display');
const statusDot    = document.getElementById('status-dot');
const stringsEl    = document.getElementById('strings');
const mCtx         = meterCanvas.getContext('2d');

let audioCtx, analyser, rafId;
let isPlaying = false;
let smoothCents = 0;
let currentStringIdx = -1;
let activeOsc = null, activeGain = null, activeOsc2 = null, activeGain2 = null;
let playingStringIdx = -1;

// Build string buttons
STRINGS.forEach((s, i) => {
  const btn = document.createElement('div');
  btn.className = 'string-btn';
  btn.id = `sbtn-${i}`;
  btn.innerHTML = `
    <div class="btn-dot"></div>
    <div class="btn-note">${s.note}</div>
    <div class="btn-oct">${s.octave}</div>
    <div class="btn-label">${s.label}</div>
  `;
  btn.addEventListener('click', () => onStringTap(i));
  stringsEl.appendChild(btn);
});

// ── Meter ──
const W = meterCanvas.width, H = meterCanvas.height;

function drawMeter(cents, state) {
  mCtx.clearRect(0, 0, W, H);

  const midX    = W / 2;
  const trackY  = H / 2 + 10;
  const trackW  = W - 100;
  const trackLeft = 50;

  // Track
  mCtx.fillStyle = '#222020';
  mCtx.fillRect(trackLeft, trackY - 1, trackW, 2);

  // Ticks
  for (let c = -50; c <= 50; c += 10) {
    const x = midX + (c / 50) * (trackW / 2);
    const big = c === 0 || c === -50 || c === 50;
    mCtx.fillStyle = c === 0 ? '#3a3630' : '#262320';
    mCtx.fillRect(x - 0.75, trackY - (big ? 10 : 6), 1.5, big ? 20 : 12);
  }

  // Labels
  mCtx.font = '400 20px DM Mono, monospace';
  mCtx.fillStyle = '#2e2b28';
  mCtx.textAlign = 'center';
  mCtx.fillText('♭', trackLeft - 18, trackY + 8);
  mCtx.fillText('♯', W - trackLeft + 18, trackY + 8);

  if (state === 'idle') return;

  const cc = Math.max(-50, Math.min(50, cents));
  const barX = midX + (cc / 50) * (trackW / 2);
  const inTune = Math.abs(cc) < 5;

  // Fill bar from center
  const fillL = Math.min(midX, barX), fillR = Math.max(midX, barX);
  if (fillR - fillL > 1) {
    if (state === 'playing') {
      mCtx.fillStyle = 'rgba(58,127,193,0.25)';
    } else {
      mCtx.fillStyle = inTune ? 'rgba(56,196,114,0.22)' : 'rgba(201,124,12,0.25)';
    }
    mCtx.fillRect(fillL, trackY - 16, fillR - fillL, 32);
  }

  // Needle bar
  const barColor = state === 'playing' ? '#5a9fe0'
                 : inTune ? '#38c472' : '#e6e2da';
  const barH = 60, barT = 3;

  mCtx.save();
  mCtx.shadowColor = barColor;
  mCtx.shadowBlur = inTune && state !== 'playing' ? 16 : 7;
  mCtx.fillStyle = barColor;
  mCtx.beginPath();
  mCtx.roundRect(barX - barT / 2, trackY - barH / 2, barT, barH, barT / 2);
  mCtx.fill();
  mCtx.restore();

  // Pivot dot
  mCtx.beginPath();
  mCtx.arc(barX, trackY, 5, 0, Math.PI * 2);
  mCtx.fillStyle = barColor;
  mCtx.fill();
}

drawMeter(0, 'idle');

// ── Autocorrelation ──
function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length, MAX = Math.floor(SIZE / 2);
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.012) return -1;

  let bestOffset = -1, bestCorr = 0, lastCorr = 1;
  for (let offset = 1; offset < MAX; offset++) {
    let corr = 0;
    for (let i = 0; i < MAX; i++) corr += Math.abs(buf[i] - buf[i + offset]);
    corr = 1 - corr / MAX;
    if (corr > 0.9 && corr > lastCorr) { bestCorr = corr; bestOffset = offset; }
    lastCorr = corr;
  }
  if (bestOffset === -1) return -1;

  let shift = 0;
  if (bestOffset > 1 && bestOffset < MAX - 1) {
    const acf = o => { let s=0; for(let i=0;i<MAX;i++) s+=Math.abs(buf[i]-buf[i+o]); return 1-s/MAX; };
    const y1=acf(bestOffset-1), y2=bestCorr, y3=acf(bestOffset+1);
    shift = (y3-y1)/(2*(2*y2-y1-y3));
  }
  return sampleRate / (bestOffset + shift);
}

function nearestString(freq) {
  let best = 0, bestDist = Infinity;
  STRINGS.forEach((s, i) => {
    const d = Math.abs(1200 * Math.log2(freq / s.freq));
    if (d < bestDist) { bestDist = d; best = i; }
  });
  return { idx: best, cents: 1200 * Math.log2(freq / STRINGS[best].freq) };
}

// ── Detection loop ──
const SMOOTH = 0.14;

function loop() {
  rafId = requestAnimationFrame(loop);
  if (!analyser || isPlaying) return;

  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, audioCtx.sampleRate);

  if (freq < 220 || freq > 520) {
    drawMeter(smoothCents, 'idle');
    return;
  }

  const { idx, cents } = nearestString(freq);
  smoothCents += (cents - smoothCents) * SMOOTH;
  currentStringIdx = idx;
  const inTune = Math.abs(smoothCents) < 5;

  updateButtons(idx, false, inTune);

  noteNameEl.textContent   = STRINGS[idx].note + STRINGS[idx].octave;
  stringLabelEl.textContent = STRINGS[idx].label.toUpperCase() + ' STRING';
  noteNameEl.style.color   = inTune ? 'var(--green-light)' : 'var(--text)';

  const sign = smoothCents >= 0 ? '+' : '';
  centsEl.textContent  = `${sign}${Math.round(smoothCents)} ¢`;
  centsEl.style.color  = inTune ? 'var(--green-light)' : 'var(--amber-light)';

  drawMeter(smoothCents, 'listening');
}

// ── Reference tone ──
function stopTone() {
  if (activeOsc) {
    try {
      const now = audioCtx.currentTime;
      activeGain.gain.cancelScheduledValues(now);
      activeGain.gain.setValueAtTime(activeGain.gain.value, now);
      activeGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      activeOsc.stop(now + 0.07);
      if (activeOsc2) { activeGain2.gain.exponentialRampToValueAtTime(0.001, now+0.06); activeOsc2.stop(now+0.07); }
    } catch(e) {}
    activeOsc = activeGain = activeOsc2 = activeGain2 = null;
  }
}

function playReferenceTone(idx) {
  if (!audioCtx) return;
  stopTone();

  isPlaying = true;
  playingStringIdx = idx;
  statusDot.className = 'playing';
  updateButtons(idx, true, false);
  noteNameEl.textContent    = STRINGS[idx].note + STRINGS[idx].octave;
  noteNameEl.style.color    = 'var(--blue-light)';
  stringLabelEl.textContent = 'REFERENCE TONE';
  centsEl.textContent       = STRINGS[idx].freq.toFixed(2) + ' Hz';
  centsEl.style.color       = 'var(--blue-light)';
  drawMeter(0, 'playing');

  const now  = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(STRINGS[idx].freq, now);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.5, now + 0.015);
  gain.gain.setValueAtTime(0.5, now + 0.5);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 2.4);

  // Warmth layer
  const osc2  = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(STRINGS[idx].freq * 1.0015, now);
  gain2.gain.setValueAtTime(0.16, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
  osc2.connect(gain2); gain2.connect(audioCtx.destination);
  osc2.start(now); osc2.stop(now + 2.4);

  activeOsc = osc; activeGain = gain;
  activeOsc2 = osc2; activeGain2 = gain2;

  osc.onended = () => {
    isPlaying = false;
    playingStringIdx = -1;
    statusDot.className = 'listening';
    updateButtons(currentStringIdx, false, false);
    noteNameEl.style.color = 'var(--text)';
    if (currentStringIdx >= 0) {
      noteNameEl.textContent    = STRINGS[currentStringIdx].note + STRINGS[currentStringIdx].octave;
      stringLabelEl.textContent = STRINGS[currentStringIdx].label.toUpperCase() + ' STRING';
    } else {
      noteNameEl.textContent    = '—';
      stringLabelEl.textContent = '\u00a0';
    }
    centsEl.textContent = '\u00a0';
    drawMeter(0, 'idle');
  };
}

function updateButtons(activeIdx, playing, inTune) {
  document.querySelectorAll('.string-btn').forEach((btn, i) => {
    btn.classList.remove('active', 'in-tune', 'playing');
    if (playing && i === playingStringIdx) {
      btn.classList.add('playing');
    } else if (!playing && i === activeIdx) {
      btn.classList.add('active');
      if (inTune) btn.classList.add('in-tune');
    }
  });
}

function onStringTap(i) {
  if (!audioCtx) return;
  playReferenceTone(i);
}

// ── Start ──
startBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    audioCtx = new AudioContext();
    await audioCtx.resume();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 600;

    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(filter);
    filter.connect(analyser);

    startPrompt.classList.add('hidden');
    tunerWrap.classList.add('active');
    statusDot.className = 'listening';
    drawMeter(0, 'idle');
    loop();
  } catch(e) {
    startBtn.textContent = 'Microphone access denied';
    startBtn.style.color = '#c97c0c';
  }
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});
</script>

</body>
</html>
