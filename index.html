<script>
// ── Strings ──
var STRINGS = [
  { note: 'G', octave: 4, freq: 392.00, label: '4th' },
  { note: 'C', octave: 4, freq: 261.63, label: '3rd' },
  { note: 'E', octave: 4, freq: 329.63, label: '2nd' },
  { note: 'A', octave: 4, freq: 440.00, label: '1st' }
];

// ── Hardcoded colors (no CSS variables in JS) ──
var C_BG        = '#141414';
var C_TRACK     = '#252220';
var C_TICK      = '#2a2725';
var C_TICK_CTR  = '#3a3630';
var C_LABEL     = '#302e2a';
var C_AMBER     = 'rgba(201,124,12,0.28)';
var C_GREEN_FILL= 'rgba(56,196,114,0.22)';
var C_BLUE_FILL = 'rgba(58,127,193,0.25)';
var C_NEEDLE_DEF= '#e6e2da';
var C_NEEDLE_IN = '#38c472';
var C_NEEDLE_BLU= '#5a9fe0';
var C_DOT_DEF   = '#e6e2da';
var C_DOT_IN    = '#38c472';
var C_DOT_BLU   = '#5a9fe0';

// ── DOM ──
var startPrompt   = document.getElementById('start-prompt');
var startBtn      = document.getElementById('start-btn');
var tunerWrap     = document.getElementById('tuner-wrap');
var noteNameEl    = document.getElementById('note-name');
var stringLabelEl = document.getElementById('string-label');
var meterCanvas   = document.getElementById('meter-canvas');
var centsEl       = document.getElementById('cents-display');
var statusDot     = document.getElementById('status-dot');
var stringsEl     = document.getElementById('strings');
var mCtx          = meterCanvas.getContext('2d');

// ── State ──
var audioCtx, analyser, rafId;
var isPlaying        = false;
var smoothCents      = 0;
var currentStringIdx = -1;
var activeOsc  = null, activeGain  = null;
var activeOsc2 = null, activeGain2 = null;
var playingStringIdx = -1;

// ── Build string buttons ──
for (var si = 0; si < STRINGS.length; si++) {
  (function(i) {
    var s   = STRINGS[i];
    var btn = document.createElement('div');
    btn.className = 'string-btn';
    btn.id = 'sbtn-' + i;
    btn.innerHTML =
      '<div class="btn-dot"></div>' +
      '<div class="btn-note">' + s.note + '</div>' +
      '<div class="btn-oct">' + s.octave + '</div>' +
      '<div class="btn-label">' + s.label + '</div>';
    btn.addEventListener('click', function() { onStringTap(i); });
    stringsEl.appendChild(btn);
  })(si);
}

// ── Meter drawing ──
var MW = meterCanvas.width;
var MH = meterCanvas.height;

function drawMeter(cents, state) {
  mCtx.clearRect(0, 0, MW, MH);

  var midX      = MW / 2;
  var trackY    = MH / 2 + 10;
  var trackW    = MW - 100;
  var trackLeft = 50;

  // Track line
  mCtx.fillStyle = C_TRACK;
  mCtx.fillRect(trackLeft, trackY - 1, trackW, 2);

  // Tick marks
  for (var c = -50; c <= 50; c += 10) {
    var x   = midX + (c / 50) * (trackW / 2);
    var big = (c === 0 || c === -50 || c === 50);
    mCtx.fillStyle = (c === 0) ? C_TICK_CTR : C_TICK;
    mCtx.fillRect(x - 0.75, trackY - (big ? 10 : 6), 1.5, big ? 20 : 12);
  }

  // Flat / sharp labels
  mCtx.font = '400 20px Georgia, serif';
  mCtx.fillStyle = C_LABEL;
  mCtx.textAlign = 'center';
  mCtx.fillText('b', trackLeft - 18, trackY + 8);
  mCtx.fillText('#', MW - trackLeft + 18, trackY + 8);

  if (state === 'idle') return;

  var cc     = Math.max(-50, Math.min(50, cents));
  var barX   = midX + (cc / 50) * (trackW / 2);
  var inTune = Math.abs(cc) < 5;

  // Fill zone from center
  var fillL = Math.min(midX, barX);
  var fillR = Math.max(midX, barX);
  if (fillR - fillL > 1) {
    if (state === 'playing')       mCtx.fillStyle = C_BLUE_FILL;
    else if (inTune)               mCtx.fillStyle = C_GREEN_FILL;
    else                           mCtx.fillStyle = C_AMBER;
    mCtx.fillRect(fillL, trackY - 16, fillR - fillL, 32);
  }

  // Needle color
  var needleColor = state === 'playing' ? C_NEEDLE_BLU
                  : inTune             ? C_NEEDLE_IN
                  :                      C_NEEDLE_DEF;

  var barH = 60, barT = 3;
  var bTop = trackY - barH / 2;

  // Glow via shadow
  mCtx.save();
  mCtx.shadowColor = needleColor;
  mCtx.shadowBlur  = (inTune && state !== 'playing') ? 16 : 8;
  mCtx.fillStyle   = needleColor;
  // Plain rect (no roundRect — iOS Safari compat)
  mCtx.fillRect(barX - barT / 2, bTop, barT, barH);
  mCtx.restore();

  // Pivot dot
  mCtx.beginPath();
  mCtx.arc(barX, trackY, 5, 0, Math.PI * 2);
  mCtx.fillStyle = needleColor;
  mCtx.fill();
}

drawMeter(0, 'idle');

var debugEl = document.getElementById('debug');

// ── Autocorrelation pitch detection (Uint8 — wider iOS WebKit support) ──
function autoCorrelate(sampleRate) {
  var SIZE = analyser.fftSize;
  var buf  = new Uint8Array(SIZE);
  analyser.getByteTimeDomainData(buf);

  // Convert to float centered on zero
  var float = new Float32Array(SIZE);
  var rms = 0;
  for (var i = 0; i < SIZE; i++) {
    float[i] = (buf[i] - 128) / 128;
    rms += float[i] * float[i];
  }
  rms = Math.sqrt(rms / SIZE);

  // Debug: show min/max of full buffer and rms
  if (debugEl) {
    var mn = 255, mx = 0;
    for (var d = 0; d < SIZE; d++) { if (buf[d] < mn) mn = buf[d]; if (buf[d] > mx) mx = buf[d]; }
    debugEl.textContent =
      'min:' + mn + ' max:' + mx + ' range:' + (mx-mn) +
      ' | rms: ' + rms.toFixed(5) +
      ' | sr: ' + sampleRate;
  }

  if (rms < 0.001) return -1;

  var MAX = Math.floor(SIZE / 2);
  var bestOffset = -1, bestCorr = 0, lastCorr = 1;

  for (var offset = 1; offset < MAX; offset++) {
    var corr = 0;
    for (var j = 0; j < MAX; j++) {
      corr += Math.abs(float[j] - float[j + offset]);
    }
    corr = 1 - corr / MAX;
    if (corr > 0.8 && corr > lastCorr) {
      bestCorr = corr;
      bestOffset = offset;
    }
    lastCorr = corr;
  }

  if (bestOffset === -1) {
    if (debugEl) debugEl.textContent += ' | no corr';
    return -1;
  }

  if (debugEl) debugEl.textContent += ' | off:' + bestOffset + ' corr:' + bestCorr.toFixed(3);

  // Parabolic interpolation for sub-sample accuracy
  var shift = 0;
  if (bestOffset > 1 && bestOffset < MAX - 1) {
    var acf = function(o) {
      var s = 0;
      for (var k = 0; k < MAX; k++) s += Math.abs(float[k] - float[k + o]);
      return 1 - s / MAX;
    };
    var y1 = acf(bestOffset - 1), y2 = bestCorr, y3 = acf(bestOffset + 1);
    var denom = 2 * (2 * y2 - y1 - y3);
    if (denom !== 0) shift = (y3 - y1) / denom;
  }

  return sampleRate / (bestOffset + shift);
}

function nearestString(freq) {
  var best = 0, bestDist = Infinity;
  for (var i = 0; i < STRINGS.length; i++) {
    var d = Math.abs(1200 * Math.log2(freq / STRINGS[i].freq));
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return { idx: best, cents: 1200 * Math.log2(freq / STRINGS[best].freq) };
}

// ── Detection loop ──
var SMOOTH = 0.14;

function loop() {
  rafId = requestAnimationFrame(loop);
  if (!analyser || isPlaying) return;

  var freq = autoCorrelate(audioCtx.sampleRate);

  if (freq < 200 || freq > 600) {
    if (debugEl && freq !== -1) debugEl.textContent += ' | freq: ' + freq.toFixed(1) + ' (out of range)';
    drawMeter(smoothCents, 'idle');
    return;
  }

  if (debugEl) debugEl.textContent += ' | freq: ' + freq.toFixed(1);

  var result = nearestString(freq);
  var idx    = result.idx;
  var cents  = result.cents;

  smoothCents += (cents - smoothCents) * SMOOTH;
  currentStringIdx = idx;
  var inTune = Math.abs(smoothCents) < 5;

  updateButtons(idx, false, inTune);

  noteNameEl.textContent    = STRINGS[idx].note + STRINGS[idx].octave;
  stringLabelEl.textContent = STRINGS[idx].label.toUpperCase() + ' STRING';
  noteNameEl.style.color    = inTune ? '#38c472' : '#e6e2da';

  var sign = smoothCents >= 0 ? '+' : '';
  centsEl.textContent = sign + Math.round(smoothCents) + ' \u00a2';
  centsEl.style.color = inTune ? '#38c472' : '#eda830';

  drawMeter(smoothCents, 'listening');
}

// ── Reference tone ──
function stopTone() {
  if (activeOsc) {
    try {
      var now = audioCtx.currentTime;
      activeGain.gain.cancelScheduledValues(now);
      activeGain.gain.setValueAtTime(activeGain.gain.value, now);
      activeGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      activeOsc.stop(now + 0.08);
      if (activeOsc2) {
        activeGain2.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        activeOsc2.stop(now + 0.08);
      }
    } catch(e) {}
    activeOsc = activeGain = activeOsc2 = activeGain2 = null;
  }
}

function playReferenceTone(idx) {
  if (!audioCtx) return;
  stopTone();

  isPlaying        = true;
  playingStringIdx = idx;
  statusDot.style.backgroundColor = '#3a7fc1';
  updateButtons(idx, true, false);
  noteNameEl.textContent    = STRINGS[idx].note + STRINGS[idx].octave;
  noteNameEl.style.color    = '#5a9fe0';
  stringLabelEl.textContent = 'REFERENCE TONE';
  centsEl.textContent       = STRINGS[idx].freq.toFixed(2) + ' Hz';
  centsEl.style.color       = '#5a9fe0';
  drawMeter(0, 'playing');

  var now   = audioCtx.currentTime;
  var osc   = audioCtx.createOscillator();
  var gain  = audioCtx.createGain();
  osc.type  = 'triangle';
  osc.frequency.setValueAtTime(STRINGS[idx].freq, now);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.5, now + 0.02);
  gain.gain.setValueAtTime(0.5, now + 0.5);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 2.4);

  var osc2  = audioCtx.createOscillator();
  var gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(STRINGS[idx].freq * 1.0015, now);
  gain2.gain.setValueAtTime(0.15, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(now);
  osc2.stop(now + 2.4);

  activeOsc = osc; activeGain = gain;
  activeOsc2 = osc2; activeGain2 = gain2;

  osc.onended = function() {
    isPlaying        = false;
    playingStringIdx = -1;
    statusDot.style.backgroundColor = '#28955a';
    updateButtons(currentStringIdx, false, false);
    noteNameEl.style.color = '#e6e2da';
    if (currentStringIdx >= 0) {
      noteNameEl.textContent    = STRINGS[currentStringIdx].note + STRINGS[currentStringIdx].octave;
      stringLabelEl.textContent = STRINGS[currentStringIdx].label.toUpperCase() + ' STRING';
    } else {
      noteNameEl.textContent    = '';
      stringLabelEl.textContent = '\u00a0';
    }
    centsEl.textContent = '\u00a0';
    drawMeter(0, 'idle');
  };
}

function updateButtons(activeIdx, playing, inTune) {
  for (var i = 0; i < STRINGS.length; i++) {
    var btn = document.getElementById('sbtn-' + i);
    btn.classList.remove('active', 'in-tune', 'playing');
    if (playing && i === playingStringIdx) {
      btn.classList.add('playing');
    } else if (!playing && i === activeIdx) {
      btn.classList.add('active');
      if (inTune) btn.classList.add('in-tune');
    }
  }
}

function onStringTap(i) {
  if (!audioCtx) return;
  playReferenceTone(i);
}

// ── Start / mic init ──
function initAudio(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume().then(function() {

    // iOS requires AudioContext to produce output before input flows.
    // Play a silent buffer to prime it.
    var silentBuf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    var silent    = audioCtx.createBufferSource();
    silent.buffer = silentBuf;
    silent.connect(audioCtx.destination);
    silent.start(0);

    analyser         = audioCtx.createAnalyser();
    analyser.fftSize = 4096;

    var source = audioCtx.createMediaStreamSource(stream);

    // iOS also needs the mic source routed toward the destination
    // (even at zero gain) to actually deliver samples to the analyser.
    var zeroGain = audioCtx.createGain();
    zeroGain.gain.value = 0.0001;
    source.connect(zeroGain);
    zeroGain.connect(audioCtx.destination);

    source.connect(analyser);

    startPrompt.classList.add('hidden');
    tunerWrap.classList.add('active');
    statusDot.style.backgroundColor = '#28955a';
    drawMeter(0, 'idle');
    loop();
  });
}

startBtn.addEventListener('click', function() {
  // Try with ideal constraints first, fall back to plain true on failure
  navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } })
    .then(function(stream) {
      initAudio(stream);
    })
    .catch(function() {
      // iOS may reject the constraint object — retry with minimal constraints
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          initAudio(stream);
        })
        .catch(function() {
          startBtn.textContent = 'Microphone access denied';
          startBtn.style.color = '#eda830';
          startBtn.style.borderColor = '#eda830';
        });
    });
});

// ── Tabs ──
var tabs = document.querySelectorAll('.tab');
for (var ti = 0; ti < tabs.length; ti++) {
  tabs[ti].addEventListener('click', function() {
    for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
    this.classList.add('active');
  });
}
</script>
